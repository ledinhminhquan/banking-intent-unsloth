# ==============================================================================
# Training Configuration for Banking77 Intent Classification with Unsloth
# ==============================================================================

model:
  name: "unsloth/Llama-3.2-3B-Instruct-bnb-4bit"
  max_seq_length: 512
  load_in_4bit: true
  dtype: null  # auto-detect (float16 for older GPUs, bfloat16 for Ampere+)

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_gradient_checkpointing: "unsloth"
  random_state: 3407

training:
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  warmup_steps: 10
  num_train_epochs: 3
  max_steps: -1  # set to positive number to override num_train_epochs
  learning_rate: 2.0e-4
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"
  seed: 42
  output_dir: "outputs"
  save_strategy: "epoch"
  report_to: "none"

data:
  train_file: "sample_data/train.csv"
  test_file: "sample_data/test.csv"
  label_map_file: "sample_data/label_map.json"

save:
  model_dir: "saved_model"

evaluate:
  run_eval_after_training: true
  max_new_tokens: 64
  temperature: 0.0
  do_sample: false
  results_file: "evaluation_results.json"
